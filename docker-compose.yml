version: '3.8'

services:
  app-backend-ventas:
    image: 461882121160.dkr.ecr.us-east-1.amazonaws.com/app-back:latest
    container_name: app-backend-ventas
    ports:
      - "8081:8080"
    restart: always
    environment:
      - SERVER_PORT=8080
      - SPRING_DATASOURCE_URL=jdbc:h2:mem:ventasdb;DB_CLOSE_DELAY=-1
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.h2.Driver
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=
      - SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.H2Dialect
      # Pisamos el MySQL de tu archivo application.properties
      - SPRING_JPA_DATABASE=H2
      - SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT=org.hibernate.dialect.H2Dialect
      - SPRING_JPA_HIBERNATE_DDL_AUTO=create

  app-backend-despachos:
    image: 461882121160.dkr.ecr.us-east-1.amazonaws.com/app-back2:latest
    container_name: app-backend-despachos
    ports:
      - "8082:8080"
    restart: always
    environment:
      - SERVER_PORT=8080
      - SPRING_DATASOURCE_URL=jdbc:h2:mem:despachosdb;DB_CLOSE_DELAY=-1
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.h2.Driver
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=
      - SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.H2Dialect
      # Pisamos el MySQL de tu archivo application.properties
      - SPRING_JPA_DATABASE=H2
      - SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT=org.hibernate.dialect.H2Dialect
      - SPRING_JPA_HIBERNATE_DDL_AUTO=create